<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Trainer</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>Sudoku Trainer</h1>
            <div class="toolbar">
                <div class="mode-toggle">
                    <button class="mode-btn active" data-mode="given">Given (G)</button>
                    <button class="mode-btn" data-mode="pen">Solved (S)</button>
                    <button class="mode-btn" data-mode="pencil">Pencil (P)</button>
                </div>
                <div class="toolbar-right">
                    <button id="validate-btn" class="tool-btn">Check Solved</button>
                    <button id="auto-candidates-btn" class="tool-btn">Auto-Candidates: OFF</button>
                    <button id="skill-profile-btn" class="tool-btn">Skill Profile</button>
                    <button id="clear-grid-btn" class="tool-btn danger">Clear Grid</button>
                </div>
            </div>
        </header>

        <main class="main">
            <div class="grid-container">
                <table id="sudoku-grid" class="sudoku-grid">
                    <!-- Grid cells generated by JS -->
                </table>
                <div class="grid-status">
                    <span id="mode-indicator">Mode: Given</span>
                    <span id="cell-indicator">-</span>
                </div>
            </div>

            <div class="chat-container">
                <div class="chat-header">
                    <h2>Tutor</h2>
                    <div class="chat-header-right">
                        <span id="provider-status" class="provider-status"></span>
                        <button id="hint-btn" class="hint-btn">Get Hint</button>
                    </div>
                </div>
                <div id="chat-messages" class="chat-messages">
                    <div class="message tutor">
                        <p>Enter a puzzle and click <strong>Get Hint</strong> when you're stuck. I'll guide you through techniques without giving away the answer.</p>
                    </div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" class="chat-input" placeholder="Ask a follow-up question..." />
                    <button id="chat-send" class="chat-send-btn">Send</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Skill Profile Modal -->
    <div id="skill-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Skill Profile</h2>
                <button id="skill-modal-close" class="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="skill-modal-body">
                <!-- Generated by JS -->
            </div>
        </div>
    </div>

    <script src="/static/js/grid.js"></script>
    <script src="/static/js/chat.js"></script>
    <script src="/static/js/skills.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
